name: publish-beta

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/copilot-instructions.md'
      - '.github/instructions/template.instructions.md'
      - '.github/workflows/publish-beta.yml'
      - '.github/workflows/publish-release.yml'
      - 'Templates/**'
      - 'Mvc/PekMvc/.template.config/template.json'
  workflow_dispatch:

jobs:
  build-publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup dotNET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Resolve beta version
        shell: pwsh
        run: |
          $projectText = Get-Content ./Templates/PeiKeSmart.Template.Bundle/PeiKeSmart.Template.Bundle.csproj -Raw
          $versionMatch = [regex]::Match($projectText, '<PackageVersion>\s*(?<version>[^<]+)\s*</PackageVersion>', [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
          if (!$versionMatch.Success)
          {
              throw 'PackageVersion was not found.'
          }

          $currentVersion = $versionMatch.Groups['version'].Value.Trim()
          $prefixMatch = [regex]::Match($currentVersion, '^(?<prefix>\d+\.\d+)\.\d{4}\.\d{4}(-beta\d{4})?$')
          if (!$prefixMatch.Success)
          {
              throw "Unexpected PackageVersion format: $currentVersion"
          }

          $chinaTimeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById('China Standard Time')
          $now = [System.TimeZoneInfo]::ConvertTime([DateTimeOffset]::UtcNow, $chinaTimeZone)
          $packageVersion = '{0}.{1}-beta{2}' -f $prefixMatch.Groups['prefix'].Value, $now.ToString('yyyy.MMdd'), $now.ToString('HHmm')
          "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate templates
        shell: pwsh
        run: ./Templates/check-template-conventions.ps1

      - name: Pack install and smoke test bundle
        shell: pwsh
        run: ./Templates/PeiKeSmart.Template.Bundle/pack-template.ps1 -PackageVersion $env:PACKAGE_VERSION -Install -SmokeTest

      - name: Publish beta package
        shell: pwsh
        run: |
          $packageOutputRoot = Join-Path (Join-Path (Join-Path '.' 'Templates') 'PeiKeSmart.Template.Bundle') 'bin/Release'
          $package = Get-ChildItem (Join-Path $packageOutputRoot 'PekBundle.Template.*.nupkg') |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            Sort-Object LastWriteTime -Descending |
              Select-Object -First 1 -ExpandProperty FullName

          if ([String]::IsNullOrWhiteSpace($package))
          {
              throw "PekBundle.Template package was not found."
          }

          Write-Host "Resolved package: $package"

          dotnet nuget push $package --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.nugetKey }}
          dotnet nuget push $package --skip-duplicate --source https://nuget.chuangchu.net/v3/index.json --api-key ${{ secrets.mynugetKey }}